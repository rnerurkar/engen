# Catalog Ingestion — platform-team maintenance pipeline configuration.
# All environment-specific values live here, NOT in code. Edit per environment.

project_id: "<GCP_PROJECT_ID>"
location: "global"            # Vertex AI Search location (global | us | eu)

# --- Vertex AI Search data stores (the 2 documented stores: patterns, skills) ---
vertex_ai_search:
  pattern_catalog:
    data_store_id: "sdlc-pattern-catalog"
    display_name: "SDLC Accelerators — Pattern Catalog"
  skill_catalog:
    data_store_id: "sdlc-skill-catalog"
    display_name: "SDLC Accelerators — Skill Catalog"

# --- Pattern source: local PDFs in the workspace ---
patterns:
  source_dir: "./catalog-sources/patterns"   # 70 pattern PDFs
  staging_gcs_bucket: "<GCS_STAGING_BUCKET>"  # PDFs staged here before indexing

# --- Skill source: GitHub repo (CONFIGURABLE) ---
skills:
  # The skills repo URL is configurable — change per company/fork without touching code.
  github_repo_url: "https://github.com/company/sdlc-accelerators-skills"
  github_ref: "main"                          # branch/tag/SHA to ingest
  skill_glob: "**/SKILL.md"                   # how skills are discovered in the repo
  # If you use a separate machine-readable manifest instead of SKILL.md frontmatter,
  # set manifest_path and the skill ingester will prefer it.
  manifest_path: ""                           # e.g. "catalog/skills-manifest.json" (optional)

# --- Agent cards source: local JSON → Apigee API Hub (NOT Vertex AI Search) ---
agent_cards:
  source_dir: "./catalog-sources/agent-cards" # 50+ agent-card JSON files
  api_hub:
    location: "us-central1"
    api_hub_instance: "<API_HUB_INSTANCE>"
    default_lifecycle: "active"
