<text x="84" y="781" font-size="12.5" fill="#9fb0c8" font-family="Arial">Deterministic predicate DSL (pass / flag / reject)</text>
<rect x="74" y="812" width="766" height="64" rx="9" fill="#1c2740" stroke="#37c98b" stroke-opacity="0.5" stroke-width="1.2"/>
<circle cx="56" cy="844.0" r="15" fill="#37c98b"/>
<text x="56" y="849.0" font-size="15" font-weight="700" fill="#0f1626" text-anchor="middle" font-family="Arial">8</text>
<text x="84" y="837" font-size="16" font-weight="700" fill="#e6edf7" font-family="Arial">Tool 4 · assemble_blueprint</text>
<text x="84" y="857" font-size="12.5" fill="#9fb0c8" font-family="Arial">design_contract.json v2.0 + 4 diagrams (Eraser MCP)</text>
<rect x="74" y="888" width="766" height="64" rx="9" fill="#1c2740" stroke="#ec4f8f" stroke-opacity="0.5" stroke-width="1.2"/>
