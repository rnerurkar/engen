<text x="104" y="1021" font-size="13.5" font-weight="700" fill="#e6edf7">10 · /accelerator.refresh</text>
<text x="300" y="1021" font-size="12" fill="#9fb0c8">Re-sync .md ↔ .drawio ↔ .json (auto-runs Step 0 of assess if stale)</text>
<rect x="92" y="1037" width="730" height="32" rx="6" fill="#172036"/>
<text x="104" y="1058" font-size="13.5" font-weight="700" fill="#e6edf7">11 · /accelerator.assess</text>
<text x="300" y="1058" font-size="12" fill="#9fb0c8">Governance Guardian (Eraser MCP) → Critical / High / Medium / Low</text>
<rect x="92" y="1074" width="730" height="32" rx="6" fill="#172036"/>
<text x="104" y="1095" font-size="13.5" font-weight="700" fill="#e6edf7">12 · verify_generation_gate</text>
<text x="300" y="1095" font-size="12" fill="#9fb0c8">Critical or High present → STOP (resolve → refresh → re-assess)</text>
<rect x="74" y="1126" width="766" height="64" rx="9" fill="#1c2740" stroke="#37c98b" stroke-opacity="0.5" stroke-width="1.2"/>
<circle cx="56" cy="1158.0" r="15" fill="#37c98b"/>
<text x="56" y="1163.0" font-size="15" font-weight="700" fill="#0f1626" text-anchor="middle" font-family="Arial">13</text>
<text x="84" y="1151" font-size="16" font-weight="700" fill="#e6edf7" font-family="Arial">/accelerator.generate</text>
<text x="84" y="1171" font-size="12.5" fill="#9fb0c8" font-family="Arial">UNLOCKED when no Critical/High → migration code + Terraform + Harness pipeline + eval</text>
<rect x="904" y="190" width="736" height="64" rx="9" fill="#1c2740" stroke="#39b0ff" stroke-opacity="0.5" stroke-width="1.2"/>
<circle cx="886" cy="222.0" r="15" fill="#39b0ff"/>
<text x="886" y="227.0" font-size="15" font-weight="700" fill="#0f1626" text-anchor="middle" font-family="Arial">14</text>
<text x="914" y="215" font-size="16" font-weight="700" fill="#e6edf7" font-family="Arial">Merge Pull Request</text>
<text x="914" y="235" font-size="12.5" fill="#9fb0c8" font-family="Arial">Triggers the Harness pipeline (platform never deploys)</text>
<rect x="904" y="266" width="736" height="64" rx="9" fill="#1c2740" stroke="#ec4f8f" stroke-opacity="0.5" stroke-width="1.2"/>
<circle cx="886" cy="298.0" r="15" fill="#ec4f8f"/>
<text x="886" y="303.0" font-size="15" font-weight="700" fill="#0f1626" text-anchor="middle" font-family="Arial">15</text>
<text x="914" y="291" font-size="16" font-weight="700" fill="#e6edf7" font-family="Arial">Harness · PRS + EvalOps gates</text>
<text x="914" y="311" font-size="12.5" fill="#9fb0c8" font-family="Arial">Production Readiness Scan → Phase-1 eval gate (golden dataset)</text>
<rect x="904" y="342" width="736" height="64" rx="9" fill="#1c2740" stroke="#39b0ff" stroke-opacity="0.5" stroke-width="1.2"/>
<circle cx="886" cy="374.0" r="15" fill="#39b0ff"/>
<text x="886" y="379.0" font-size="15" font-weight="700" fill="#0f1626" text-anchor="middle" font-family="Arial">16</text>
<text x="914" y="367" font-size="16" font-weight="700" fill="#e6edf7" font-family="Arial">Harness · Sign &amp; Attest</text>
<text x="914" y="387" font-size="12.5" fill="#9fb0c8" font-family="Arial">cosign + Binary Authorization (NEVER-SWAPPABLE)</text>
<rect x="904" y="418" width="736" height="106" rx="9" fill="#1c2740" stroke="#39b0ff" stroke-opacity="0.5" stroke-width="1.2"/>
<circle cx="886" cy="471.0" r="15" fill="#39b0ff"/>
<text x="886" y="476.0" font-size="15" font-weight="700" fill="#0f1626" text-anchor="middle" font-family="Arial">17</text>
<text x="914" y="443" font-size="16" font-weight="700" fill="#e6edf7" font-family="Arial">Harness · Build, deploy &amp; promote per env</text>
<text x="914" y="463" font-size="12.5" fill="#9fb0c8" font-family="Arial">terraform apply (infra) · docker build (per agent) · deploy to Agent Engine</text>
<text x="914" y="480" font-size="12.5" fill="#9fb0c8" font-family="Arial">publish proxy API to Apigee · register the agent as an API Product in API Hub</text>
<text x="914" y="497" font-size="12.5" fill="#9fb0c8" font-family="Arial">NON-PROD → PRE-PROD (canary 10%) → PROD (progressive rollout · auto-rollback)</text>
<rect x="904" y="536" width="736" height="64" rx="9" fill="#1c2740" stroke="#37c98b" stroke-opacity="0.5" stroke-width="1.2"/>
<circle cx="886" cy="568.0" r="15" fill="#37c98b"/>
<text x="886" y="573.0" font-size="15" font-weight="700" fill="#0f1626" text-anchor="middle" font-family="Arial">18</text>
<text x="914" y="561" font-size="16" font-weight="700" fill="#e6edf7" font-family="Arial">Comes alive in prod</text>
<text x="914" y="581" font-size="12.5" fill="#9fb0c8" font-family="Arial">Dynatrace APM · Phoenix/Arize traces · AWS Config · golden-dataset eval</text>
<text x="40" y="1228" font-size="12.5" fill="#9fb0c8">Two HITL points: (1) SA edits the .md/.drawio then /accelerator.refresh; (2) /accelerator.assess loops until NO Critical/High remain. The optional Step-0 Epic front door and Tool 2 both run on the ONE Solution Accelerator Agent.</text>
<text x="40" y="1248" font-size="12.5" fill="#9fb0c8">/accelerator.generate is blocked until the gate is clean. Harness owns infra, per-agent build, Agent Engine deploy, and per-env API Hub registration.</text>
