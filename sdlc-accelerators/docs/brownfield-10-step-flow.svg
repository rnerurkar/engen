<text x="84" y="933" font-size="12.5" fill="#9fb0c8" font-family="Arial">SA edits app-blueprint.md and/or the .drawio.xml; /accelerator.refresh re-syncs</text>
<rect x="74" y="964" width="766" height="150" rx="10" fill="none" stroke="#ec4f8f" stroke-width="1.5"/>
<text x="92" y="988" font-size="15" font-weight="700" fill="#ec4f8f">HITL #2 · /accelerator.assess gate — loop until clean</text>
