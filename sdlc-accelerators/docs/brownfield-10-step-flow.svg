<text x="917.4" y="129" font-size="12.5" fill="#9fb0c8">Operate</text>
<text x="40" y="172" font-size="17" font-weight="800" fill="#f5a623">BUILD &amp; GOVERN — Epic front door + 2 HITL review loops</text>
<text x="880" y="172" font-size="17" font-weight="800" fill="#39b0ff">HARNESS CI/CD — BUILD, DEPLOY &amp; PROMOTE</text>
