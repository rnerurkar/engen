<text x="84" y="305" font-size="16" font-weight="700" fill="#e6edf7" font-family="Arial">CSA Agent (upstream)</text>
<text x="84" y="325" font-size="12.5" fill="#9fb0c8" font-family="Arial">Validated CSA diagram — authoritative current state</text>
<rect x="74" y="356" width="766" height="64" rx="9" fill="#1c2740" stroke="#37c98b" stroke-opacity="0.5" stroke-width="1.2"/>
