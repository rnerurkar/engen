<text x="56" y="697.0" font-size="15" font-weight="700" fill="#0f1626" text-anchor="middle" font-family="Arial">6</text>
<text x="84" y="685" font-size="16" font-weight="700" fill="#8b7bf0" font-family="Arial">Tool 2 · recommend_architecture  (the Solution Accelerator Agent)</text>
<text x="84" y="705" font-size="12.5" fill="#9fb0c8" font-family="Arial">The ONE LLM stage — the agent&#x27;s FunctionTool composes patterns (RAG)</text>
<rect x="74" y="736" width="766" height="64" rx="9" fill="#1c2740" stroke="#37c98b" stroke-opacity="0.5" stroke-width="1.2"/>
