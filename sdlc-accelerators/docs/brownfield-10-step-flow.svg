<text x="56" y="393.0" font-size="15" font-weight="700" fill="#0f1626" text-anchor="middle" font-family="Arial">2</text>
<text x="84" y="381" font-size="16" font-weight="700" fill="#e6edf7" font-family="Arial">/speckit.specify</text>
<text x="84" y="401" font-size="12.5" fill="#9fb0c8" font-family="Arial">csa-extractor reconciles inventory; 8-signal blocks → spec.md</text>
<rect x="74" y="432" width="766" height="64" rx="9" fill="#1c2740" stroke="#ec4f8f" stroke-opacity="0.5" stroke-width="1.2"/>
