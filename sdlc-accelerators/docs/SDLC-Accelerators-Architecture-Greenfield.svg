  <text x="30" y="112" class="s9">/specify → spec.md</text>
  <text x="30" y="125" class="s9">/plan → plan.md</text>
  <text x="30" y="140" class="s8">10-section + biz rules + IF/THEN</text>
  <text x="30" y="153" class="s8">VS Code + Copilot (Claude Opus 4.6)</text>
  <text x="30" y="166" class="s8">Employer internal tool</text>

