<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 850" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .title { font-size: 20; font-weight: bold; }
    .subtitle { font-size: 10; fill: #555; }
    .step-circle { fill: #FF8C00; }
    .step-num { fill: white; font-size: 13; font-weight: bold; }
    .bold { font-weight: bold; }
    .s12 { font-size: 12; }
    .s11 { font-size: 11; }
    .s10 { font-size: 10; }
    .s9 { font-size: 9; }
    .s8 { font-size: 8; fill: #555; }
    .gray { fill: #666; }
    .white { fill: white; }
    .arrow { stroke: #555; stroke-width: 1.5; fill: none; marker-end: url(#ah); }
    .arrow-d { stroke: #999; stroke-width: 1.2; fill: none; stroke-dasharray: 5,3; marker-end: url(#ah); }
  </style>
  <defs>
