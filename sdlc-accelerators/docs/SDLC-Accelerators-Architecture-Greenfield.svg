  <text x="530" y="28" class="title">SDLC Accelerators — End-to-End Component Architecture (Greenfield)</text>
  <text x="310" y="44" class="subtitle">Spec → Solution Accelerator (RAG + API Hub A2A) → app-blueprint.md/.json → Governance Guardian → skill-guided code → production</text>

