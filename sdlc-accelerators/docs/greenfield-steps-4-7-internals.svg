<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 800" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .title { font-size: 19px; font-weight: bold; fill: #1a1a2e; }
    .sub { font-size: 10.5px; fill: #666; }
    .band { font-size: 11px; font-weight: bold; fill: #455A64; letter-spacing: .3px; }
    .b { font-weight: bold; }
    .s12 { font-size: 12px; } .s11 { font-size: 11px; } .s10 { font-size: 10px; }
    .s9 { font-size: 9px; } .s9g { font-size: 9px; fill: #666; } .s8 { font-size: 8px; fill: #777; }
    .arrow  { stroke: #555; stroke-width: 1.6; fill: none; marker-end: url(#ah); }
    .arrowp { stroke: #7C3AED; stroke-width: 2; fill: none; marker-end: url(#ahp); }
    .arrowd { stroke: #999; stroke-width: 1.3; fill: none; stroke-dasharray: 5,3; marker-end: url(#ah); }
  </style>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#555"/></marker>
    <marker id="ahp" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0,9 3.5,0 7" fill="#7C3AED"/></marker>
    <filter id="sh" x="-3%" y="-3%" width="106%" height="106%"><feDropShadow dx="0.6" dy="0.6" stdDeviation="1.4" flood-color="#00000014"/></filter>
  </defs>

  <rect x="0" y="0" width="1120" height="800" fill="#FFFFFF"/>
  <text x="560" y="30" text-anchor="middle" class="title">Inside the Solution Accelerator — One MCP Server, One Agent</text>
  <text x="560" y="50" text-anchor="middle" class="sub">Blueprint steps 4–7 internals + the optional Epic-to-Spec front door. The MCP server delegates to ONE ADK agent — the Solution Accelerator Agent — with two FunctionTools.</text>

  <rect x="24" y="66" width="1072" height="610" rx="10" fill="#FCFCFD" stroke="#CFD8DC" stroke-width="1.5"/>
  <text x="40" y="84" class="s9" fill="#90A4AE">Solution Accelerator MCP Server · Cloud Run · OAuth 2.1 + Entra ID · delegates to ONE ADK agent (transport / async / auth / orchestration only — no reasoning)</text>

  <!-- BAND 1: blueprint steps 4-7 -->
  <text x="44" y="106" class="band">BLUEPRINT PIPELINE — full-lifecycle steps 4–7  (blueprint_start background job)</text>
  <rect x="44" y="116" width="150" height="78" rx="7" fill="#FFF3E0" stroke="#EF6C00" stroke-width="1.5" filter="url(#sh)"/>
  <text x="119" y="133" text-anchor="middle" class="s8" fill="#EF6C00">STEP 4 · deterministic</text>
  <text x="119" y="150" text-anchor="middle" class="s11 b">validate_spec</text>
  <text x="119" y="166" text-anchor="middle" class="s9g">signal extraction</text>
  <text x="119" y="178" text-anchor="middle" class="s9g">quality gate (PASS/WARN/BLOCK)</text>
  <line x1="194" y1="155" x2="212" y2="155" class="arrow"/>
  <rect x="212" y="116" width="474" height="78" rx="7" fill="#F7F4FC" stroke="#7C3AED" stroke-width="1.6" filter="url(#sh)"/>
  <text x="449" y="131" text-anchor="middle" class="s9" fill="#7C3AED">STEP 5 · recommend_architecture  (delegated to the agent's recommend_architecture FunctionTool)</text>
  <rect x="222" y="138" width="132" height="48" rx="5" fill="#F5F5F5" stroke="#90A4AE" stroke-width="1"/>
  <text x="288" y="156" text-anchor="middle" class="s10 b">retrieve()</text>
  <text x="288" y="169" text-anchor="middle" class="s8">RAG + API Hub</text>
  <text x="288" y="180" text-anchor="middle" class="s8">deterministic</text>
  <rect x="360" y="138" width="170" height="48" rx="5" fill="#F3E8FF" stroke="#7C3AED" stroke-width="1.6"/>
  <text x="445" y="155" text-anchor="middle" class="s10 b" fill="#7C3AED">invoke_llm_agent ★</text>
  <text x="445" y="168" text-anchor="middle" class="s8" fill="#7C3AED">invokes the model (Gemini)</text>
  <text x="445" y="180" text-anchor="middle" class="s8" fill="#7C3AED">NON-deterministic</text>
  <rect x="536" y="138" width="142" height="48" rx="5" fill="#F5F5F5" stroke="#90A4AE" stroke-width="1"/>
  <text x="607" y="156" text-anchor="middle" class="s10 b">parse_selections</text>
  <text x="607" y="169" text-anchor="middle" class="s8">typed selections</text>
  <text x="607" y="180" text-anchor="middle" class="s8">deterministic</text>
  <line x1="686" y1="155" x2="704" y2="155" class="arrow"/>
  <rect x="704" y="116" width="156" height="78" rx="7" fill="#FFF3E0" stroke="#EF6C00" stroke-width="1.5" filter="url(#sh)"/>
  <text x="782" y="133" text-anchor="middle" class="s8" fill="#EF6C00">STEP 6 · deterministic</text>
  <text x="782" y="150" text-anchor="middle" class="s11 b">validate_composition</text>
  <text x="782" y="166" text-anchor="middle" class="s9g">adjacency rules</text>
  <text x="782" y="178" text-anchor="middle" class="s9g">(no Loop in Parallel)</text>
  <line x1="860" y1="155" x2="878" y2="155" class="arrow"/>
  <rect x="878" y="116" width="196" height="78" rx="7" fill="#FFF3E0" stroke="#EF6C00" stroke-width="1.5" filter="url(#sh)"/>
  <text x="976" y="133" text-anchor="middle" class="s8" fill="#EF6C00">STEP 7 · deterministic</text>
  <text x="976" y="150" text-anchor="middle" class="s11 b">assemble_blueprint</text>
  <text x="976" y="166" text-anchor="middle" class="s9g">builds .md / .json / DSL</text>
  <text x="976" y="178" text-anchor="middle" class="s9g">→ calls Eraser MCP to render</text>

  <!-- BAND 2: the Solution Accelerator Agent (ADK) with two FunctionTools -->
  <rect x="318" y="242" width="484" height="128" rx="10" fill="#F3E8FF" stroke="#7C3AED" stroke-width="2.5" filter="url(#sh)"/>
  <text x="560" y="262" text-anchor="middle" class="s12 b" fill="#7C3AED">Solution Accelerator Agent — ADK framework (ONE agent · Gemini)</text>
  <text x="560" y="278" text-anchor="middle" class="s9g">The MCP server DELEGATES here. The agent owns exactly two FunctionTools:</text>
  <rect x="334" y="286" width="216" height="52" rx="6" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.4"/>
  <text x="442" y="302" text-anchor="middle" class="s8" fill="#7C3AED">FunctionTool · non-deterministic ★</text>
  <text x="442" y="317" text-anchor="middle" class="s10 b">recommend_architecture</text>
  <text x="442" y="330" text-anchor="middle" class="s8">↑ Step 5 architecture reasoning</text>
  <rect x="570" y="286" width="216" height="52" rx="6" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.4"/>
  <text x="678" y="302" text-anchor="middle" class="s8" fill="#7C3AED">FunctionTool · non-deterministic ★</text>
  <text x="678" y="317" text-anchor="middle" class="s10 b">create_epic_signal_ledger</text>
  <text x="678" y="330" text-anchor="middle" class="s8">↘ Phase A epic shaping</text>
  <text x="334" y="357" class="s9" fill="#7C3AED"><tspan class="b">It reasons; it never acts.</tspan></text>

  <!-- arrow: step5 invoke chip -> recommend_architecture tool -->
  <line x1="445" y1="186" x2="445" y2="284" class="arrowp"/>
  <text x="372" y="232" text-anchor="middle" class="s9" fill="#7C3AED" font-style="italic">delegate("recommend_architecture")</text>

  <!-- BAND 3: epic front door -->
  <text x="44" y="392" class="band">EPIC-TO-SPEC FRONT DOOR — ingest_epic  (OPTIONAL · Greenfield)</text>
  <rect x="44" y="404" width="150" height="40" rx="6" fill="#FFF8E1" stroke="#F9A825" stroke-width="1.4" stroke-dasharray="4,2"/>
  <text x="119" y="421" text-anchor="middle" class="s9 b" fill="#F57F17">Rally Epic (content only)</text>
  <text x="119" y="434" text-anchor="middle" class="s8">via Rally MCP · .vscode/mcp.json</text>
  <line x1="119" y1="444" x2="119" y2="470" class="arrowd"/>
  <rect x="44" y="470" width="172" height="86" rx="7" fill="#E0F2F1" stroke="#00897B" stroke-width="1.6" filter="url(#sh)"/>
  <text x="130" y="487" text-anchor="middle" class="s8" fill="#00897B">NEW MCP TOOL · ASYNC</text>
  <text x="130" y="503" text-anchor="middle" class="s11 b">ingest_epic_start</text>
  <text x="130" y="518" text-anchor="middle" class="s9g">accepts the Epic from the IDE</text>
  <text x="130" y="530" text-anchor="middle" class="s9g">(content only — no credentials)</text>
  <text x="130" y="546" text-anchor="middle" class="s8">delegates Phase A · runs Phase B</text>
  <line x1="216" y1="513" x2="234" y2="513" class="arrow"/>
  <rect x="234" y="470" width="248" height="86" rx="7" fill="#F3E8FF" stroke="#7C3AED" stroke-width="1.6" filter="url(#sh)"/>
  <text x="358" y="487" text-anchor="middle" class="s8" fill="#7C3AED">PHASE A · non-deterministic ★</text>
  <text x="358" y="503" text-anchor="middle" class="s11 b" fill="#7C3AED">agentic shaping</text>
  <text x="358" y="518" text-anchor="middle" class="s9g">Solution Accelerator Agent runs</text>
  <text x="358" y="530" text-anchor="middle" class="s9g">create_epic_signal_ledger (extractive)</text>
  <text x="358" y="546" text-anchor="middle" class="s8">span-grounded · cannot fabricate/alter</text>
  <line x1="482" y1="513" x2="500" y2="513" class="arrow"/>
  <!-- arrow: Phase A -> create_epic_signal_ledger tool -->
  <line x1="430" y1="468" x2="636" y2="340" class="arrowp"/>
  <text x="585" y="432" text-anchor="middle" class="s9" fill="#7C3AED" font-style="italic">delegate("create_epic_signal_ledger")</text>
  <rect x="500" y="474" width="170" height="78" rx="7" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2" filter="url(#sh)"/>
  <text x="585" y="491" text-anchor="middle" class="s8" fill="#2E7D32">INTERMEDIATE ARTIFACT</text>
  <text x="585" y="507" text-anchor="middle" class="s11 b" fill="#2E7D32">Epic Signal Ledger</text>
  <text x="585" y="521" text-anchor="middle" class="s9g">section-keyed · span-traced</text>
  <text x="585" y="533" text-anchor="middle" class="s8">epic-signal-ledger.json</text>
  <text x="585" y="546" text-anchor="middle" class="s8">(schema epic-signal-ledger/v1)</text>
  <line x1="670" y1="513" x2="688" y2="513" class="arrow"/>
  <rect x="688" y="470" width="210" height="86" rx="7" fill="#FFF3E0" stroke="#EF6C00" stroke-width="1.6" filter="url(#sh)"/>
  <text x="793" y="487" text-anchor="middle" class="s8" fill="#EF6C00">PHASE B · deterministic (no LLM)</text>
  <text x="793" y="503" text-anchor="middle" class="s11 b">mapping</text>
  <text x="793" y="518" text-anchor="middle" class="s9g">ledger → 10-section spec.md</text>
  <text x="793" y="530" text-anchor="middle" class="s9g">+ fill-ratio confidence</text>
  <text x="793" y="546" text-anchor="middle" class="s8">+ Rally provenance (ObjectVersion)</text>
  <line x1="898" y1="513" x2="916" y2="513" class="arrow"/>
  <rect x="916" y="474" width="158" height="78" rx="7" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2" filter="url(#sh)"/>
  <text x="995" y="491" text-anchor="middle" class="s8" fill="#2E7D32">OUTPUT</text>
  <text x="995" y="507" text-anchor="middle" class="s11 b" fill="#2E7D32">spec.md</text>
  <text x="995" y="521" text-anchor="middle" class="s9g">signal-bearing · 10 sections</text>
  <text x="995" y="533" text-anchor="middle" class="s9g">Rally provenance header</text>
  <text x="995" y="546" text-anchor="middle" class="s8">→ /specify review → /plan</text>

  <text x="44" y="600" class="s9"><tspan class="b">★</tspan> non-deterministic (the agent's FunctionTools on Gemini)   ·   <tspan fill="#EF6C00">▮</tspan> deterministic server stage   ·   <tspan fill="#2E7D32">▮</tspan> artifact   ·   <tspan fill="#7C3AED">purple arrows</tspan> = server delegates to one of the agent's two FunctionTools</text>

  <!-- IP boundary -->
  <rect x="24" y="618" width="1072" height="158" rx="10" fill="#FFFDE7" stroke="#F9A825" stroke-width="1.5"/>
  <text x="44" y="640" class="s12 b" fill="#E65100">IP boundary — claimed novelty vs shared ADK patterns</text>
  <text x="44" y="662" class="s10">• <tspan class="b">Agent + 2 FunctionTools = shared ADK pattern → NOT claimed.</tspan> It overlaps the external platform's design-agent-with-tools structure, so SDLC does not rely on it as a distinguishing claim.</text>
  <text x="44" y="682" class="s10">• <tspan class="b">Claimed novelty is the artifact + mechanism:</tspan> the section-keyed (by the 10 spec sections), span-traced Epic Signal Ledger — NOT the external platform's Epic-IR / requirement-objects; NOT a Signal Validation Matrix.</text>
  <text x="44" y="702" class="s10">• <tspan class="b">Extractive guarantee.</tspan> Every signal carries a verbatim epic_span AND a span-grounded value; the validator drops invented numbers/units — no fabricated or altered requirements.</text>
  <text x="44" y="722" class="s10">• <tspan class="b">Deterministic confidence.</tspan> Per-section confidence = signal-slot FILL RATIO (Phase B) — NOT agent-reported. Staleness = Rally ObjectVersion token, NOT content-hash.</text>
  <text x="44" y="742" class="s10">• <tspan class="b">Governance = assess-gate finding.</tspan> Epic-coverage is a Governance Guardian finding class — NOT a cosign-signed Design Contract / Binary Authorization attestation (out of scope here).</text>
  <text x="44" y="762" class="s8" fill="#999">If the agent/tool structure is judged to overlap, claim only the ledger artifact + mechanism above. (Not legal advice — confirm claim-level non-overlap with a patent practitioner.)</text>
</svg>
