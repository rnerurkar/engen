server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # SPA: serve index.html for any route that doesn't match a static file
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the Orchestrator Cloud Run service.
    # Replace $ORCHESTRATOR_URL at deploy time or use envsubst.
    # For Cloud Run "service-to-service" calls, set the
    # ORCHESTRATOR_INTERNAL_URL env var and use envsubst in your
    # entrypoint script.  This default config simply routes /api to
    # localhost:9000 which works when deployed alongside the orchestrator.
    location /api/ {
        proxy_pass http://localhost:9000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 600s;
    }
}
